[command]
bin = "git"

[deny]
args = [
    # Flags — override git internals or inject config
    "--upload-pack",
    "-u",
    "--config",
    "-c",
    "--exec-path",
    "--template",
    "--config-env",
    "--receive-pack",

    # Subcommands — dangerous plumbing and credential access
    "credential",
    "daemon",
    "shell",
    "upload-pack",
    "receive-pack",
    "upload-archive",
]

[env]
strip = ["GIT_SSH_COMMAND", "GIT_CONFIG", "GIT_CONFIG_GLOBAL", "GIT_CONFIG_PARAMETERS", "GIT_ATTR_SOURCE", "GIT_CONFIG_COUNT"]
set = { GIT_CONFIG_NOSYSTEM = "1", GIT_CONFIG_COUNT = "1", GIT_CONFIG_KEY_0 = "core.hooksPath", GIT_CONFIG_VALUE_0 = "/dev/null" }

[exec]
concurrent = true
