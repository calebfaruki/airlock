apiVersion: airlock.dev/v1
kind: AirlockTool
metadata:
  name: git-commit
spec:
  description: "Commit staged changes with a message"
  parameters:
    type: object
    properties:
      message:
        type: string
    required:
      - message
  image: ghcr.io/calebfaruki/airlock-git:latest
  command: "git commit -m \"{message}\""
